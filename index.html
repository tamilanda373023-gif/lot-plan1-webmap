<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Style for the Lot Tooltips to ensure they stay clear */
        .css_LotPolygon1_0 {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        </style>
        <title>Johor Lot Map</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/LotPolygon1_0.js"></script>
        <script src="data/Boundarypoints_1.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.0604938384780547,103.58092451071019],[2.0624260209193577,103.58330408369544]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com">Leaflet</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        // --- GOOGLE SATELLITE LAYER ---
        var googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 28,
            subdomains:['mt0','mt1','mt2','mt3'],
            attribution: '&copy; Google'
        }).addTo(map);

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                popup._contentNode.classList.add('media');
                setTimeout(function() { popup.update(); }, 10);
            }
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);

        function pop_LotPolygon1_0(feature, layer) {
            var popupContent = '<table>\
                    <tr><th scope="row">Lot</th><td>' + (feature.properties['Lot'] !== null ? autolinker.link(String(feature.properties['Lot'])) : '') + '</td>\</tr>\
                    <tr><th scope="row">Pemilik</th><td>' + (feature.properties['tsp — pemilik_PEMILIK'] !== null ? autolinker.link(String(feature.properties['tsp — pemilik_PEMILIK'])) : '') + '</td>\</tr>\
                    <tr><th scope="row">Daerah</th><td>' + (feature.properties['tsp — hakmilik_DAERAH'] !== null ? autolinker.link(String(feature.properties['tsp — hakmilik_DAERAH'])) : '') + '</td>\</tr>\
                    <tr><th scope="row">No PA</th><td>' + (feature.properties['tsp — hakmilik_NO_PA'] !== null ? autolinker.link(String(feature.properties['tsp — hakmilik_NO_PA'])) : '') + '</td>\</tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_LotPolygon1_0_0() {
            return {
                pane: 'pane_LotPolygon1_0',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)', // White outline for visibility
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0, 
                fill: true,
                fillOpacity: 0.3, // Semi-transparent so you can see satellite below
                fillColor: 'rgba(164,113,88,1.0)',
                interactive: true,
            }
        }

        map.createPane('pane_LotPolygon1_0');
        map.getPane('pane_LotPolygon1_0').style.zIndex = 400;
        
        var layer_LotPolygon1_0 = new L.geoJson(json_LotPolygon1_0, {
            interactive: true,
            dataVar: 'json_LotPolygon1_0',
            layerName: 'layer_LotPolygon1_0',
            pane: 'pane_LotPolygon1_0',
            onEachFeature: pop_LotPolygon1_0,
            style: style_LotPolygon1_0_0,
        });
        bounds_group.addLayer(layer_LotPolygon1_0);
        map.addLayer(layer_LotPolygon1_0);

        // Labels modification - Larger, Bold, and Shadowed
        var i = 0;
        layer_LotPolygon1_0.eachLayer(function(layer) {
            var labelContent = '<div style="color: #ffffff; font-size: 18px; font-weight: bold; font-family: \'Arial\', sans-serif; text-shadow: 2px 2px 3px #000000;">' + layer.feature.properties['Lot'] + '</div>';
            layer.bindTooltip((layer.feature.properties['Lot'] !== null ? String(labelContent) : ''), {
                permanent: true, 
                direction: 'center',
                className: 'css_LotPolygon1_0'
            });
            labels.push(layer);
        });

        // Layer Control to switch between Satellite and Standard (Optional)
        var baseMaps = { "Google Satellite": googleSat };
        L.control.layers(baseMaps, {"Lot Polygons": layer_LotPolygon1_0}).addTo(map);

        resetLabels([layer_LotPolygon1_0]);
        map.on("zoomend", function(){ resetLabels([layer_LotPolygon1_0]); });
        </script>
    </body>
</html>
